services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: openmarket
      POSTGRES_USER: openmarket
      POSTGRES_PASSWORD: openmarket
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmarket -d openmarket"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - openmarket-postgres:/var/lib/postgresql/data

volumes:
  openmarket-postgres:
