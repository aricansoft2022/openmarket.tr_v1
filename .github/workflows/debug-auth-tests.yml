name: Debug auth tests

on:
  push:
    branches: [agent/auth-abuse-controls]

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/auth-abuse-controls
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Capture unit-test output
        shell: bash
        run: |
          set +e
          npm run test:run > TEST_DEBUG.txt 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            rm -f TEST_DEBUG.txt
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "4189828+github-actions[bot]@users.noreply.github.com"
          git add TEST_DEBUG.txt
          git diff --cached --quiet || git commit -m "chore: capture auth unit-test failure"
          git push origin HEAD:agent/auth-abuse-controls
