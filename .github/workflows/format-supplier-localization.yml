name: Format final Supplier localization

on:
  push:
    branches: [agent/supplier-onboarding-screens]

permissions:
  contents: write

concurrency:
  group: format-final-supplier-localization
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/supplier-onboarding-screens
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Format repository
        run: npm run format

      - name: Remove temporary workflow
        run: rm .github/workflows/format-supplier-localization.yml

      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "style: format bilingual Supplier screens"
          git push origin HEAD:agent/supplier-onboarding-screens
