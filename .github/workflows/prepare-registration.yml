name: Prepare registration slice

on:
  push:
    branches: [agent/auth-entry-screens]

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://openmarket:openmarket@127.0.0.1:5432/openmarket
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/auth-entry-screens
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate migration
        run: npm run db:generate

      - name: Format repository
        run: npm run format

      - name: Commit generated output
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "feat(auth): generate registration preferences migration"
          git push origin HEAD:agent/auth-entry-screens
