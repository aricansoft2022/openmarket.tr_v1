name: Prepare Supplier onboarding branch

on:
  push:
    branches: [agent/supplier-onboarding-screens]

permissions:
  contents: write

concurrency:
  group: prepare-supplier-onboarding-branch
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/supplier-onboarding-screens
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply deterministic integration patch
        run: node scripts/patch-supplier-onboarding-structure.mjs

      - name: Remove temporary specification evidence and workflow
        run: |
          rm -rf .debug
          rm .github/workflows/prepare-supplier-screen-contract.yml

      - name: Format repository
        run: npm run format

      - name: Commit prepared branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "feat: integrate Supplier onboarding S01-S04"
          git push origin HEAD:agent/supplier-onboarding-screens
