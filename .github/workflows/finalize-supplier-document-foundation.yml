name: Finalize Supplier document foundation

on:
  push:
    branches: [agent/supplier-company-documents]

permissions:
  contents: write

concurrency:
  group: finalize-supplier-document-foundation
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://openmarket:openmarket@127.0.0.1:5432/openmarket
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: openmarket
          POSTGRES_USER: openmarket
          POSTGRES_PASSWORD: openmarket
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openmarket -d openmarket"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/supplier-company-documents
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply pending reviewed patches
        run: |
          test ! -f scripts/patch-supplier-document-foundation.mjs || node scripts/patch-supplier-document-foundation.mjs
          test ! -f scripts/patch-supplier-document-safety.mjs || node scripts/patch-supplier-document-safety.mjs
          test ! -f scripts/patch-supplier-document-lifecycle.mjs || node scripts/patch-supplier-document-lifecycle.mjs

      - name: Wire permanent verification commands
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          package_path = Path('package.json')
          package = json.loads(package_path.read_text(encoding='utf-8'))
          package['scripts']['db:verify:supplier-document-lifecycle'] = (
              'tsx scripts/verify-supplier-document-lifecycle.ts'
          )
          package_path.write_text(
              json.dumps(package, indent=2, ensure_ascii=False) + '\n',
              encoding='utf-8',
          )

          targeted_path = Path('.github/workflows/supplier-documents.yml')
          targeted = targeted_path.read_text(encoding='utf-8')
          lifecycle_step = '''\n      - name: Verify private Supplier document lifecycle\n        run: npm run db:verify:supplier-document-lifecycle\n'''
          if 'db:verify:supplier-document-lifecycle' not in targeted:
              marker = '''      - name: Verify Supplier document catalogue\n        run: npm run db:verify:supplier-documents\n'''
              if marker not in targeted:
                  raise SystemExit('Supplier document targeted workflow marker not found.')
              targeted = targeted.replace(marker, marker + lifecycle_step)
              targeted_path.write_text(targeted, encoding='utf-8')

          ci_path = Path('.github/workflows/ci.yml')
          ci = ci_path.read_text(encoding='utf-8')
          document_steps = '''\n      - name: Seed Supplier document catalogue\n        run: npm run db:seed:supplier-documents\n\n      - name: Verify Supplier document catalogue\n        run: npm run db:verify:supplier-documents\n\n      - name: Verify private Supplier document lifecycle\n        run: npm run db:verify:supplier-document-lifecycle\n'''
          if 'db:verify:supplier-document-lifecycle' not in ci:
              marker = '''      - name: Verify Supplier launch catalogue\n        run: npm run db:verify:supplier-catalogue\n'''
              if marker not in ci:
                  raise SystemExit('Main CI Supplier catalogue marker not found.')
              ci = ci.replace(marker, marker + document_steps)
              ci_path.write_text(ci, encoding='utf-8')
          PY

      - name: Regenerate migration from hardened schema
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          journal_path = Path('drizzle/meta/_journal.json')
          journal = json.loads(journal_path.read_text(encoding='utf-8'))
          entries = journal.get('entries', [])
          entry = next((item for item in entries if item.get('idx') == 8), None)
          if entry:
              Path(f"drizzle/{entry['tag']}.sql").unlink(missing_ok=True)
              Path('drizzle/meta/0008_snapshot.json').unlink(missing_ok=True)
              journal['entries'] = [item for item in entries if item.get('idx') != 8]
              journal_path.write_text(
                  json.dumps(journal, indent=2) + '\n',
                  encoding='utf-8',
              )
          PY
          npm run db:generate

      - name: Remove temporary write tooling
        run: |
          rm -f \
            .github/workflows/apply-supplier-document-policy.yml \
            .github/workflows/prepare-supplier-documents-final.yml \
            .github/workflows/prepare-supplier-document-contract.yml \
            .github/workflows/finalize-supplier-document-foundation.yml \
            scripts/patch-supplier-document-foundation.mjs \
            scripts/patch-supplier-document-safety.mjs \
            scripts/patch-supplier-document-lifecycle.mjs

      - name: Format repository
        run: npm run format

      - name: Check types and unit policy
        run: |
          npm run typecheck
          npm run test:run -- app/lib/supplier/documents app/lib/authorization/platform-staff.test.ts

      - name: Check and apply migrations
        run: |
          npm run db:check
          npm run db:migrate

      - name: Seed and verify Supplier catalogues
        run: |
          npm run db:seed:supplier-catalogue
          npm run db:verify:supplier-catalogue
          npm run db:seed:supplier-documents
          npm run db:verify:supplier-documents

      - name: Verify private document lifecycle
        run: npm run db:verify:supplier-document-lifecycle

      - name: Commit verified foundation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "feat: finalize private Supplier document foundation"
          git push origin HEAD:agent/supplier-company-documents
