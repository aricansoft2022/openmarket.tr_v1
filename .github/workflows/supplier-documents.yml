name: Verify Supplier activation lifecycle

on:
  pull_request:
    paths:
      - "app/lib/supplier/activation*.ts"
      - "scripts/verify-supplier-activation.ts"
      - "scripts/patch-supplier-activation-integration.mjs"
      - "package.json"
      - ".github/workflows/supplier-documents.yml"

permissions:
  contents: write

jobs:
  verify:
    if: github.head_ref == 'agent/supplier-activation-state-machine'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://openmarket:openmarket@127.0.0.1:5432/openmarket
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: openmarket
          POSTGRES_USER: openmarket
          POSTGRES_PASSWORD: openmarket
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openmarket -d openmarket"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply integration fixture corrections
        run: node scripts/patch-supplier-activation-integration.mjs

      - name: Format activation verification
        run: npx prettier --write scripts/verify-supplier-activation.ts package.json

      - name: Verify application source
        run: |
          npm run typecheck
          npm run test:run
          npm run build

      - name: Verify Supplier activation in PostgreSQL
        run: |
          npm run db:migrate
          npm run db:seed:supplier-catalogue
          npm run db:seed:supplier-documents
          npm run db:verify:supplier-activation

      - name: Commit verified activation fixture
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/verify-supplier-activation.ts scripts/patch-supplier-activation-integration.mjs package.json
          git diff --cached --quiet && {
            echo "Expected Supplier activation fixture changes were not produced." >&2
            exit 1
          }
          git commit -m "test: verify Supplier activation lifecycle in PostgreSQL"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
