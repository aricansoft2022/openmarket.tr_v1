name: Materialize Supplier activation verification

on:
  pull_request:
    paths:
      - "app/lib/authorization/platform-staff.ts"
      - "app/lib/supplier/activation-admin.server.ts"
      - "scripts/patch-supplier-activation-verification.mjs"
      - "tests/supplier-activation-permissions.test.ts"
      - ".github/workflows/supplier-documents.yml"

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'agent/supplier-activation-state-machine'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://openmarket:openmarket@127.0.0.1:5432/openmarket
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: openmarket
          POSTGRES_USER: openmarket
          POSTGRES_PASSWORD: openmarket
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openmarket -d openmarket"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply activation verification updates
        run: node scripts/patch-supplier-activation-verification.mjs

      - name: Format changed source
        run: >-
          npx prettier --write
          app/lib/authorization/platform-staff.ts
          app/lib/supplier/activation-admin.server.ts
          scripts/verify-supplier-company-foundation.ts
          tests/supplier-activation-permissions.test.ts

      - name: Verify application source
        run: |
          npm run typecheck
          npm run test:run
          npm run build

      - name: Verify activation-aware Supplier foundation
        run: |
          npm run db:migrate
          npm run db:seed:supplier-catalogue
          npm run db:seed:supplier-documents
          npm run db:verify:supplier-company

      - name: Commit materialized verification
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/authorization/platform-staff.ts app/lib/supplier/activation-admin.server.ts scripts/verify-supplier-company-foundation.ts tests/supplier-activation-permissions.test.ts scripts/patch-supplier-activation-verification.mjs
          git diff --cached --quiet && {
            echo "Expected activation verification changes were not produced." >&2
            exit 1
          }
          git commit -m "test: verify Supplier activation transitions and permissions"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
