name: Materialize Supplier activation hooks

on:
  pull_request:
    paths:
      - "scripts/patch-supplier-activation-hooks.mjs"
      - ".github/workflows/supplier-documents.yml"

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'agent/supplier-activation-state-machine'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply activation hooks
        run: node scripts/patch-supplier-activation-hooks.mjs

      - name: Format changed source
        run: >-
          npx prettier --write
          app/lib/supplier/profile.server.ts
          app/lib/supplier/documents/service.server.ts

      - name: Verify source
        run: |
          npm run typecheck
          npm run test:run
          npm run build

      - name: Commit materialized hooks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/supplier/profile.server.ts app/lib/supplier/documents/service.server.ts scripts/patch-supplier-activation-hooks.mjs
          git diff --cached --quiet && {
            echo "Expected activation hook changes were not produced." >&2
            exit 1
          }
          git commit -m "feat: reevaluate Supplier activation after evidence changes"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
