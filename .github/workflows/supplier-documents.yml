name: Format Supplier activation source

on:
  pull_request:
    paths:
      - "app/lib/db/schema/**"
      - "app/lib/supplier/**"
      - "tests/supplier-activation.test.ts"
      - ".github/workflows/supplier-documents.yml"

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'agent/supplier-activation-state-machine'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Format activation source
        run: >-
          npx prettier --write
          app/lib/db/schema/outbox.ts
          app/lib/supplier/activation.ts
          app/lib/supplier/activation.server.ts
          tests/supplier-activation.test.ts

      - name: Commit formatted source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/db/schema/outbox.ts app/lib/supplier/activation.ts app/lib/supplier/activation.server.ts tests/supplier-activation.test.ts
          git diff --cached --quiet && {
            echo "Expected formatting changes were not produced." >&2
            exit 1
          }
          git commit -m "style: format Supplier activation source"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
