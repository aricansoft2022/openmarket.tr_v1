name: Prepare platform staff management

on:
  pull_request:
    branches: [main]

jobs:
  prepare:
    if: github.head_ref == 'agent/platform-staff-assignment-management'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/platform-staff-assignment-management
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Update source documentation
        run: |
          python - <<'PY'
          from pathlib import Path

          additions = {
              "DECISIONS.md": """

## 2026-07-13 — Staff assignment management uses a two-level hierarchy and forbids self-management

**Decision:** Manage fixed platform staff assignments through a separate administrator-only workflow. Platform Admin may grant, revoke or reactivate operational roles. Only Super Admin may change Platform Admin or Super Admin assignments. No manager may change their own assignments.

**Reason:** A single unrestricted administrator role would allow privilege escalation and accidental removal of the actor's own access. A narrow hierarchy preserves operational delegation while reserving administrator-role changes for the highest fixed role. Resolving assignments on every request makes grants and revocations effective without waiting for session expiry.

**Security boundary:** The target must already have an account identified by normalized exact email. Every mutation requires a reason, writes immutable audit evidence with the effective manager role and preserves one unique user/role row by reactivating revoked assignments. Reviewer, Moderator, Buyer and Supplier state never grants assignment-management authority.

**Rejected:** Self-service escalation; Platform Admin management of administrator roles; free-form custom roles; arbitrary permission JSON; silent duplicate rows; unaudited database-only role changes as the normal operational workflow.
""",
              "DATA_MODEL.md": """

### Staff assignment lifecycle

The administrator workflow preserves the unique `(user_id, role)` row in `platform_staff_assignments`. A new grant inserts an active row; a grant of a previously revoked role reactivates that row and clears revocation fields; a duplicate active grant is rejected. Revocation records the actor, time and mandatory reason instead of deleting history.

Platform Admin may manage only operational roles. Super Admin may manage administrator and operational roles. No actor may grant or revoke their own assignment. Grant and revoke actions create immutable `audit_logs` rows containing the effective manager role, old/new values, reason and request evidence. Authorization reads active assignments on every request, so state changes apply immediately to the next request.
""",
              "TEST_PLAN.md": """

## Platform staff assignment management evidence

The PostgreSQL, route and unit gates must prove:

- anonymous users and non-manager roles cannot list or mutate staff assignments;
- Platform Admin can manage operational roles but cannot grant or revoke Platform Admin or Super Admin;
- Super Admin can manage both administrator and operational roles;
- no manager can grant or revoke their own assignments;
- grants require an existing account identified by normalized exact email and a mandatory reason;
- duplicate active user/role grants are rejected;
- regranting a revoked user/role reuses the existing unique row and clears revocation fields;
- revocation requires an active assignment and a mandatory reason;
- grants and revocations affect permission resolution on the next request without session renewal;
- immutable audit evidence records actor, effective manager role, old/new values, reason and request identifier;
- `/admin/staff` covers permission denied, empty/list, validation, successful grant, active, revoked and successful reactivation states.
""",
          }

          for filename, block in additions.items():
              path = Path(filename)
              text = path.read_text()
              heading = block.strip().splitlines()[0]
              if heading not in text:
                  path.write_text(text.rstrip() + block + "\n")
          PY

      - name: Format repository
        run: npm run format

      - name: Commit prepared files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "docs(authz): prepare staff management verification"
          git push origin HEAD:agent/platform-staff-assignment-management
