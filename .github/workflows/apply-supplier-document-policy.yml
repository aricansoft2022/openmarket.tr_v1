name: Finalize Supplier document foundation

on:
  push:
    branches: [agent/supplier-company-documents]

permissions:
  contents: write

concurrency:
  group: finalize-supplier-document-foundation
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/supplier-company-documents
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply reviewed policy and safety corrections
        run: |
          node scripts/patch-supplier-document-foundation.mjs
          node scripts/patch-supplier-document-safety.mjs

      - name: Regenerate Supplier document migration
        run: |
          rm -f drizzle/0008_*.sql drizzle/meta/0008_snapshot.json
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";
          const path = "drizzle/meta/_journal.json";
          const journal = JSON.parse(readFileSync(path, "utf8"));
          journal.entries = journal.entries.filter((entry) => entry.idx !== 8);
          writeFileSync(path, `${JSON.stringify(journal, null, 2)}\n`);
          NODE
          npm run db:generate
          migration="$(ls drizzle/0008_*.sql)"
          cat >> "$migration" <<'SQL'
          --> statement-breakpoint
          CREATE OR REPLACE FUNCTION prevent_supplier_document_review_event_mutation()
          RETURNS trigger
          LANGUAGE plpgsql
          AS $$
          BEGIN
            RAISE EXCEPTION 'supplier_document_review_events rows are immutable';
          END;
          $$;
          --> statement-breakpoint
          CREATE TRIGGER supplier_document_review_events_immutable
          BEFORE UPDATE OR DELETE ON "supplier_document_review_events"
          FOR EACH ROW
          EXECUTE FUNCTION prevent_supplier_document_review_event_mutation();
          SQL

      - name: Format repository
        run: npm run format

      - name: Remove temporary preparation files
        run: |
          rm .github/workflows/apply-supplier-document-policy.yml
          rm scripts/patch-supplier-document-foundation.mjs
          rm scripts/patch-supplier-document-safety.mjs

      - name: Commit finalized foundation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "feat: finalize Supplier document foundation"
          git push origin HEAD:agent/supplier-company-documents
