name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-supplier-documents:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://openmarket:openmarket@127.0.0.1:5432/openmarket
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply reviewed corrections
        run: |
          for patch in \
            scripts/patch-supplier-document-foundation.mjs \
            scripts/patch-supplier-document-safety.mjs \
            scripts/patch-supplier-document-lifecycle.mjs \
            scripts/patch-supplier-document-ui.mjs \
            scripts/patch-supplier-document-domain-guards.mjs
          do
            test ! -f "$patch" || node "$patch"
          done
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";
          const path = "package.json";
          const packageJson = JSON.parse(readFileSync(path, "utf8"));
          packageJson.scripts["db:verify:supplier-document-lifecycle"] =
            "tsx scripts/verify-supplier-document-lifecycle.ts";
          writeFileSync(path, `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/supplier-documents.yml')
          source = path.read_text(encoding='utf-8')
          step = '''
      - name: Verify private Supplier document lifecycle
        run: npm run db:verify:supplier-document-lifecycle
'''
          if 'db:verify:supplier-document-lifecycle' not in source:
              marker = '''      - name: Verify Supplier document catalogue
        run: npm run db:verify:supplier-documents
'''
              if marker not in source:
                  raise SystemExit('Supplier document workflow marker not found.')
              path.write_text(source.replace(marker, marker + step), encoding='utf-8')
          PY

      - name: Regenerate Supplier document migration
        run: |
          rm -f drizzle/0008_*.sql drizzle/meta/0008_snapshot.json
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";
          const path = "drizzle/meta/_journal.json";
          const journal = JSON.parse(readFileSync(path, "utf8"));
          journal.entries = journal.entries.filter((entry) => entry.idx !== 8);
          writeFileSync(path, `${JSON.stringify(journal, null, 2)}\n`);
          NODE
          npm run db:generate
          migration="$(ls drizzle/0008_*.sql)"
          cat >> "$migration" <<'SQL'
          --> statement-breakpoint
          CREATE OR REPLACE FUNCTION prevent_supplier_document_review_event_mutation()
          RETURNS trigger
          LANGUAGE plpgsql
          AS $$
          BEGIN
            RAISE EXCEPTION 'supplier_document_review_events rows are immutable';
          END;
          $$;
          --> statement-breakpoint
          CREATE TRIGGER supplier_document_review_events_immutable
          BEFORE UPDATE OR DELETE ON "supplier_document_review_events"
          FOR EACH ROW
          EXECUTE FUNCTION prevent_supplier_document_review_event_mutation();
          SQL

      - name: Remove temporary write tooling
        run: |
          rm -f .github/workflows/apply-supplier-document-policy.yml
          rm -f .github/workflows/prepare-supplier-documents-final.yml
          rm -f .github/workflows/prepare-supplier-document-contract.yml
          rm -f .github/workflows/finalize-supplier-document-foundation.yml
          rm -f .github/workflows/finalize-supplier-document-ui.yml
          rm -f .github/workflows/finalize-supplier-documents-reviewed.yml
          rm -f scripts/patch-supplier-document-foundation.mjs
          rm -f scripts/patch-supplier-document-safety.mjs
          rm -f scripts/patch-supplier-document-lifecycle.mjs
          rm -f scripts/patch-supplier-document-ui.mjs
          rm -f scripts/patch-supplier-document-domain-guards.mjs

      - name: Format prepared repository
        run: npm run format

      - name: Package prepared files
        run: |
          tar -czf /tmp/supplier-document-lifecycle.tar.gz \
            app/lib/authorization/platform-staff.server.ts \
            app/lib/authorization/platform-staff.test.ts \
            app/lib/authorization/platform-staff.ts \
            app/lib/db/schema/index.ts \
            app/lib/db/schema/supplier-documents.ts \
            app/lib/supplier/documents \
            app/routes/admin.supplier-documents.tsx \
            'app/routes/admin.supplier-documents.$documentId.tsx' \
            'app/routes/supplier.document-access.$token.ts' \
            'app/routes/supplier.documents.$documentId.tsx' \
            app/routes/supplier.documents.tsx \
            app/routes/supplier.documents.upload.tsx \
            app/styles/supplier-documents.css \
            app/root.tsx \
            app/routes.ts \
            app/routes.test.ts \
            package.json \
            drizzle/0008_*.sql \
            drizzle/meta/0008_snapshot.json \
            drizzle/meta/_journal.json \
            scripts/seed-supplier-document-catalogue.ts \
            scripts/verify-supplier-document-catalogue.ts \
            scripts/verify-supplier-document-lifecycle.ts \
            .github/workflows/supplier-documents.yml

      - name: Upload prepared repository
        uses: actions/upload-artifact@v4
        with:
          name: supplier-document-lifecycle
          path: /tmp/supplier-document-lifecycle.tar.gz
          if-no-files-found: error
          retention-days: 1

  verify:
    needs: prepare-supplier-documents
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download prepared repository
        uses: actions/download-artifact@v4
        with:
          name: supplier-document-lifecycle
          path: /tmp/prepared

      - name: Apply prepared repository
        run: |
          rm -f .github/workflows/apply-supplier-document-policy.yml
          rm -f .github/workflows/prepare-supplier-documents-final.yml
          rm -f .github/workflows/prepare-supplier-document-contract.yml
          rm -f .github/workflows/finalize-supplier-document-foundation.yml
          rm -f .github/workflows/finalize-supplier-document-ui.yml
          rm -f .github/workflows/finalize-supplier-documents-reviewed.yml
          rm -f scripts/patch-supplier-document-foundation.mjs
          rm -f scripts/patch-supplier-document-safety.mjs
          rm -f scripts/patch-supplier-document-lifecycle.mjs
          rm -f scripts/patch-supplier-document-ui.mjs
          rm -f scripts/patch-supplier-document-domain-guards.mjs
          tar -xzf /tmp/prepared/supplier-document-lifecycle.tar.gz

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check formatting
        run: npm run format:check

      - name: Check documentation contract
        run: npm run docs:check

      - name: Check runtime configuration contract
        run: npm run config:check

      - name: Check types
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:run

      - name: Build production bundle
        run: npm run build

  database:
    needs: prepare-supplier-documents
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://openmarket:openmarket@127.0.0.1:5432/openmarket
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: openmarket
          POSTGRES_USER: openmarket
          POSTGRES_PASSWORD: openmarket
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openmarket -d openmarket"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download prepared repository
        uses: actions/download-artifact@v4
        with:
          name: supplier-document-lifecycle
          path: /tmp/prepared

      - name: Apply prepared repository
        run: |
          rm -f .github/workflows/apply-supplier-document-policy.yml
          rm -f .github/workflows/prepare-supplier-documents-final.yml
          rm -f .github/workflows/prepare-supplier-document-contract.yml
          rm -f .github/workflows/finalize-supplier-document-foundation.yml
          rm -f .github/workflows/finalize-supplier-document-ui.yml
          rm -f .github/workflows/finalize-supplier-documents-reviewed.yml
          rm -f scripts/patch-supplier-document-foundation.mjs
          rm -f scripts/patch-supplier-document-safety.mjs
          rm -f scripts/patch-supplier-document-lifecycle.mjs
          rm -f scripts/patch-supplier-document-ui.mjs
          rm -f scripts/patch-supplier-document-domain-guards.mjs
          tar -xzf /tmp/prepared/supplier-document-lifecycle.tar.gz

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check migration metadata
        run: npm run db:check

      - name: Apply and verify migrations
        run: npm run db:verify

      - name: Verify Better Auth persistence
        run: npm run db:verify:auth

      - name: Verify transactional registration preferences
        run: npm run db:verify:registration

      - name: Verify email verification and password recovery
        run: npm run db:verify:recovery

      - name: Verify Google OAuth policy and authorization contract
        run: npm run db:verify:google

      - name: Verify explicit Google account linking and unlinking
        run: npm run db:verify:google-linking

      - name: Verify business identity and buyer activation state machine
        run: npm run db:verify:business-identity

      - name: Verify authenticated A08-A10 onboarding workflow
        run: npm run db:verify:business-identity-onboarding

      - name: Verify private business identity evidence lifecycle
        run: npm run db:verify:business-identity-evidence

      - name: Verify permissioned business identity review lifecycle
        run: npm run db:verify:business-identity-review

      - name: Verify audited platform staff assignment management
        run: npm run db:verify:platform-staff-management

      - name: Seed Supplier launch catalogue
        run: npm run db:seed:supplier-catalogue

      - name: Verify Supplier launch catalogue
        run: npm run db:verify:supplier-catalogue

      - name: Verify supplier company profile foundation
        run: npm run db:verify:supplier-company

      - name: Seed Supplier document catalogue
        run: npm run db:seed:supplier-documents

      - name: Verify Supplier document catalogue
        run: npm run db:verify:supplier-documents

      - name: Verify private Supplier document lifecycle
        run: npm run db:verify:supplier-document-lifecycle
