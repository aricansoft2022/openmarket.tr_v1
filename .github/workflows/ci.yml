name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-supplier-documents:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply reviewed corrections
        run: |
          node scripts/patch-supplier-document-foundation.mjs
          node scripts/patch-supplier-document-safety.mjs

      - name: Regenerate Supplier document migration
        run: |
          rm -f drizzle/0008_*.sql drizzle/meta/0008_snapshot.json
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";
          const path = "drizzle/meta/_journal.json";
          const journal = JSON.parse(readFileSync(path, "utf8"));
          journal.entries = journal.entries.filter((entry) => entry.idx !== 8);
          writeFileSync(path, `${JSON.stringify(journal, null, 2)}\n`);
          NODE
          npm run db:generate
          migration="$(ls drizzle/0008_*.sql)"
          cat >> "$migration" <<'SQL'
          --> statement-breakpoint
          CREATE OR REPLACE FUNCTION prevent_supplier_document_review_event_mutation()
          RETURNS trigger
          LANGUAGE plpgsql
          AS $$
          BEGIN
            RAISE EXCEPTION 'supplier_document_review_events rows are immutable';
          END;
          $$;
          --> statement-breakpoint
          CREATE TRIGGER supplier_document_review_events_immutable
          BEFORE UPDATE OR DELETE ON "supplier_document_review_events"
          FOR EACH ROW
          EXECUTE FUNCTION prevent_supplier_document_review_event_mutation();
          SQL

      - name: Format prepared files
        run: npm run format

      - name: Package prepared files
        run: |
          tar -czf /tmp/supplier-document-foundation.tar.gz \
            app/lib/db/schema/supplier-documents.ts \
            app/lib/supplier/documents/catalogue.ts \
            app/lib/supplier/documents/policy.ts \
            app/lib/supplier/documents/policy.test.ts \
            app/lib/supplier/documents/service.server.ts \
            package.json \
            drizzle/0008_*.sql \
            drizzle/meta/0008_snapshot.json \
            drizzle/meta/_journal.json \
            scripts/seed-supplier-document-catalogue.ts \
            scripts/verify-supplier-document-catalogue.ts

      - name: Upload prepared files
        uses: actions/upload-artifact@v4
        with:
          name: supplier-document-foundation
          path: /tmp/supplier-document-foundation.tar.gz
          if-no-files-found: error
          retention-days: 1

  verify:
    needs: prepare-supplier-documents
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download prepared files
        uses: actions/download-artifact@v4
        with:
          name: supplier-document-foundation
          path: /tmp/prepared

      - name: Apply prepared files
        run: tar -xzf /tmp/prepared/supplier-document-foundation.tar.gz

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check formatting
        run: npm run format:check

      - name: Check documentation contract
        run: npm run docs:check

      - name: Check runtime configuration contract
        run: npm run config:check

      - name: Check types
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:run

      - name: Build production bundle
        run: npm run build

  database:
    needs: prepare-supplier-documents
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://openmarket:openmarket@127.0.0.1:5432/openmarket
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: openmarket
          POSTGRES_USER: openmarket
          POSTGRES_PASSWORD: openmarket
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openmarket -d openmarket"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download prepared files
        uses: actions/download-artifact@v4
        with:
          name: supplier-document-foundation
          path: /tmp/prepared

      - name: Apply prepared files
        run: tar -xzf /tmp/prepared/supplier-document-foundation.tar.gz

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check migration metadata
        run: npm run db:check

      - name: Apply and verify migrations
        run: npm run db:verify

      - name: Verify Better Auth persistence
        run: npm run db:verify:auth

      - name: Verify transactional registration preferences
        run: npm run db:verify:registration

      - name: Verify email verification and password recovery
        run: npm run db:verify:recovery

      - name: Verify Google OAuth policy and authorization contract
        run: npm run db:verify:google

      - name: Verify explicit Google account linking and unlinking
        run: npm run db:verify:google-linking

      - name: Verify business identity and buyer activation state machine
        run: npm run db:verify:business-identity

      - name: Verify authenticated A08-A10 onboarding workflow
        run: npm run db:verify:business-identity-onboarding

      - name: Verify private business identity evidence lifecycle
        run: npm run db:verify:business-identity-evidence

      - name: Verify permissioned business identity review lifecycle
        run: npm run db:verify:business-identity-review

      - name: Verify audited platform staff assignment management
        run: npm run db:verify:platform-staff-management

      - name: Seed Supplier launch catalogue
        run: npm run db:seed:supplier-catalogue

      - name: Verify Supplier launch catalogue
        run: npm run db:verify:supplier-catalogue

      - name: Verify supplier company profile foundation
        run: npm run db:verify:supplier-company
