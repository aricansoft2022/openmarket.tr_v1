name: CI

on:
  pull_request:
  push:
    branches: [main, agent/phase-0-foundation]

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check formatting
        run: npm run format:check

      - name: Check documentation contract
        run: npm run docs:check

      - name: Check types
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:run

      - name: Build production bundle
        run: npm run build

  format-foundation:
    if: github.event_name == 'push' && github.ref == 'refs/heads/agent/phase-0-foundation'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout foundation branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase-0-foundation
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Format repository
        run: npm run format

      - name: Commit formatter output
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "style: apply repository formatting"
          git push origin HEAD:agent/phase-0-foundation
