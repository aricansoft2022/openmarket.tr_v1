name: CI

on:
  pull_request:
  push:
    branches: [main, agent/google-oauth-policy]

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check formatting
        run: npm run format:check

      - name: Check documentation contract
        run: npm run docs:check

      - name: Check runtime configuration contract
        run: npm run config:check

      - name: Check types
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:run

      - name: Build production bundle
        run: npm run build

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://openmarket:openmarket@127.0.0.1:5432/openmarket
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: openmarket
          POSTGRES_USER: openmarket
          POSTGRES_PASSWORD: openmarket
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openmarket -d openmarket"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check migration metadata
        run: npm run db:check

      - name: Apply and verify migrations
        run: npm run db:verify

      - name: Verify Better Auth persistence
        run: npm run db:verify:auth

      - name: Verify transactional registration preferences
        run: npm run db:verify:registration

      - name: Verify email verification and password recovery
        run: npm run db:verify:recovery

      - name: Verify Google OAuth policy and authorization contract
        run: npm run db:verify:google

  capture-format-errors:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/agent/google-oauth-policy') ||
      (github.event_name == 'pull_request' && github.head_ref == 'agent/google-oauth-policy')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/google-oauth-policy
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Capture formatter output
        shell: bash
        run: |
          set +e
          npm run format:check > FORMAT_ERRORS.txt 2>&1
          status=$?
          git config user.name "github-actions[bot]"
          git config user.email "4189828+github-actions[bot]@users.noreply.github.com"
          git add FORMAT_ERRORS.txt
          git commit -m "chore(auth): capture format diagnostics"
          git push origin HEAD:agent/google-oauth-policy
          exit "$status"
