name: CI

on:
  pull_request:
  push:
    branches: [main, agent/phase-0-foundation]

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Verify
        run: npm run verify

  finalize-lockfile:
    if: github.event_name == 'push' && github.ref == 'refs/heads/agent/phase-0-foundation'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout foundation branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase-0-foundation
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate deterministic lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Commit lockfile
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git diff --cached --quiet || git commit -m "chore: lock dependencies"
          git push origin HEAD:agent/phase-0-foundation
