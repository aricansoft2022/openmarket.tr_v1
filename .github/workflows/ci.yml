name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    outputs:
      prepared_sha: ${{ steps.prepared.outputs.sha }}
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Materialize and extract production-capability evidence
        run: |
          npm run spec:materialize
          mkdir -p .debug
          python - <<'PY'
          from pathlib import Path

          source = Path('spec.full.md').read_text(encoding='utf-8').splitlines()
          patterns = (
              'production capabil',
              'production line',
              'production-line',
              'production process',
              'manufacturing capabil',
              'machinery',
              'facility information',
              'weaving',
              'knitting',
              'dyeing',
              'printing',
              'embroidery',
              'sewing',
              'cutting',
              'quilting',
              'finishing',
              'packaging',
              'private-label',
              'made-to-order',
          )
          matches = [
              index
              for index, line in enumerate(source)
              if any(pattern in line.casefold() for pattern in patterns)
          ]
          if not matches:
              raise SystemExit('No production-capability evidence found in materialized specification.')

          windows = []
          for index in matches:
              start = max(0, index - 12)
              end = min(len(source), index + 18)
              if windows and start <= windows[-1][1]:
                  windows[-1] = (windows[-1][0], max(windows[-1][1], end))
              else:
                  windows.append((start, end))

          output = [
              '# Extracted production-capability evidence',
              '',
              'Generated from the SHA-verified `spec.full.md`; temporary audit evidence only.',
              '',
          ]
          for start, end in windows:
              output.append(f'## Source lines {start + 1}-{end}')
              output.append('')
              output.extend(f'{line_number:05d}: {source[line_number - 1]}' for line_number in range(start + 1, end + 1))
              output.append('')

          Path('.debug/supplier-capability-source.md').write_text('\n'.join(output), encoding='utf-8')
          PY

      - name: Commit extracted source
        id: prepared
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .debug/supplier-capability-source.md
          git diff --cached --quiet || git commit -m "chore: capture Supplier capability source evidence"
          git push origin HEAD:${{ github.head_ref }}
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  verify:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout prepared commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.prepared_sha }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check formatting
        run: npm run format:check

      - name: Check documentation contract
        run: npm run docs:check

      - name: Check runtime configuration contract
        run: npm run config:check

      - name: Check types
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:run

      - name: Build production bundle
        run: npm run build

  database:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://openmarket:openmarket@127.0.0.1:5432/openmarket
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: openmarket
          POSTGRES_USER: openmarket
          POSTGRES_PASSWORD: openmarket
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openmarket -d openmarket"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout prepared commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.prepared_sha }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check migration metadata
        run: npm run db:check

      - name: Apply and verify migrations
        run: npm run db:verify

      - name: Verify Better Auth persistence
        run: npm run db:verify:auth

      - name: Verify transactional registration preferences
        run: npm run db:verify:registration

      - name: Verify email verification and password recovery
        run: npm run db:verify:recovery

      - name: Verify Google OAuth policy and authorization contract
        run: npm run db:verify:google

      - name: Verify explicit Google account linking and unlinking
        run: npm run db:verify:google-linking

      - name: Verify business identity and buyer activation state machine
        run: npm run db:verify:business-identity

      - name: Verify authenticated A08-A10 onboarding workflow
        run: npm run db:verify:business-identity-onboarding

      - name: Verify private business identity evidence lifecycle
        run: npm run db:verify:business-identity-evidence

      - name: Verify permissioned business identity review lifecycle
        run: npm run db:verify:business-identity-review

      - name: Verify audited platform staff assignment management
        run: npm run db:verify:platform-staff-management

      - name: Verify supplier company profile foundation
        run: npm run db:verify:supplier-company
