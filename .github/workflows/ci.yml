name: CI

on:
  pull_request:
  push:
    branches: [main, agent/better-auth-persistence]

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check formatting
        run: npm run format:check

      - name: Check documentation contract
        run: npm run docs:check

      - name: Check runtime configuration contract
        run: npm run config:check

      - name: Check types
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:run

      - name: Build production bundle
        run: npm run build

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://openmarket:openmarket@127.0.0.1:5432/openmarket
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: openmarket
          POSTGRES_USER: openmarket
          POSTGRES_PASSWORD: openmarket
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openmarket -d openmarket"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check migration metadata
        run: npm run db:check

      - name: Apply and verify migrations
        run: npm run db:verify

  prepare-auth-schema:
    if: github.event_name == 'push' && github.ref == 'refs/heads/agent/better-auth-persistence'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://openmarket:openmarket@127.0.0.1:5432/openmarket
    steps:
      - name: Checkout auth branch
        uses: actions/checkout@v4
        with:
          ref: agent/better-auth-persistence
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Drizzle migration
        run: npm run db:generate

      - name: Format repository
        run: npm run format

      - name: Commit generated schema
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "feat(auth): generate Better Auth migration"
          git push origin HEAD:agent/better-auth-persistence
