name: Prepare evidence integration repair

on:
  push:
    branches: [agent/register-business-identity-evidence-routes]

permissions:
  contents: write

concurrency:
  group: prepare-evidence-integration-repair
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/register-business-identity-evidence-routes
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Format repository
        run: npm run format

      - name: Commit formatted files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "style: format evidence integration repair"
          git push origin HEAD:agent/register-business-identity-evidence-routes
