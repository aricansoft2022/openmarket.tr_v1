name: Prepare Supplier document foundation

on:
  push:
    branches: [agent/supplier-company-documents]

permissions:
  contents: write

concurrency:
  group: prepare-supplier-document-foundation
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://openmarket:openmarket@127.0.0.1:5432/openmarket
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/supplier-company-documents
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply deterministic service corrections
        run: node scripts/patch-supplier-document-service.mjs

      - name: Remove temporary extraction evidence and workflow
        run: |
          rm -rf .debug
          rm .github/workflows/prepare-supplier-document-contract.yml

      - name: Generate reviewed migration
        run: npm run db:generate

      - name: Format repository
        run: npm run format

      - name: Commit prepared branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "feat: prepare private Supplier document foundation"
          git push origin HEAD:agent/supplier-company-documents
