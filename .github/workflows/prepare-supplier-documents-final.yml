name: Prepare hardened Supplier document migration

on:
  push:
    branches: [agent/supplier-company-documents]

permissions:
  contents: write

concurrency:
  group: prepare-hardened-supplier-documents
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://openmarket:openmarket@127.0.0.1:5432/openmarket
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/supplier-company-documents
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply pending reviewed corrections
        run: |
          test ! -f scripts/patch-supplier-document-foundation.mjs || node scripts/patch-supplier-document-foundation.mjs
          test ! -f scripts/patch-supplier-document-safety.mjs || node scripts/patch-supplier-document-safety.mjs

      - name: Remove stale generated migration
        run: |
          rm -f drizzle/0008_misty_gargoyle.sql drizzle/meta/0008_snapshot.json
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path('drizzle/meta/_journal.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          data['entries'] = [entry for entry in data['entries'] if entry.get('idx') != 8]
          path.write_text(json.dumps(data, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Generate reviewed migration
        run: npm run db:generate

      - name: Remove temporary write workflows
        run: |
          rm -f .github/workflows/apply-supplier-document-policy.yml
          rm .github/workflows/prepare-supplier-documents-final.yml

      - name: Format repository
        run: npm run format

      - name: Commit prepared branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix: regenerate hardened Supplier document migration"
          git push origin HEAD:agent/supplier-company-documents
