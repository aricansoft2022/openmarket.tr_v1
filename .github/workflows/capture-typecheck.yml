name: Capture auth typecheck

on:
  push:
    branches: [agent/auth-entry-screens]

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/auth-entry-screens
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Capture TypeScript output
        shell: bash
        run: |
          set +e
          npm run typecheck > TYPECHECK_DEBUG.txt 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            rm -f TYPECHECK_DEBUG.txt
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TYPECHECK_DEBUG.txt
          git commit -m "chore(auth): capture typecheck output"
          git push origin HEAD:agent/auth-entry-screens
          exit "$status"
