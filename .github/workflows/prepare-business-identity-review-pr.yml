name: Prepare reviewer authorization PR

on:
  pull_request:
    branches: [main]

jobs:
  prepare:
    if: github.head_ref == 'agent/business-identity-review-authorization'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/business-identity-review-authorization
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Patch effective-role transition contract
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          transition = Path("app/lib/business-identity/transitions.server.ts")
          text = transition.read_text()

          replacements = [
              (
                  """    reason: string;
              requestId?: string;
            },
          ) {""",
                  """    reason: string;
              requestId?: string;
              effectiveRole?: string;
            },
          ) {""",
              ),
              (
                  '    effectiveRole: "authenticated",',
                  '    effectiveRole: input.effectiveRole ?? "authenticated",',
              ),
              (
                  """    reviewId: string;
              reviewerId: string;
              decision: \"verified\" | \"rejected\";""",
                  """    reviewId: string;
              reviewerId: string;
              effectiveRole: string;
              decision: \"verified\" | \"rejected\";""",
              ),
              (
                  """  await writeAudit(database, {
              actorId: input.reviewerId,
              action:""",
                  """  await writeAudit(database, {
              actorId: input.reviewerId,
              effectiveRole: input.effectiveRole,
              action:""",
              ),
          ]
          for old, new in replacements:
              if old in text:
                  text = text.replace(old, new, 1)
              elif new not in text:
                  raise SystemExit(f"transition replacement not found: {old[:40]!r}")
          transition.write_text(text)

          for filename in [
              "scripts/verify-business-identity.ts",
              "scripts/verify-business-identity-onboarding.ts",
          ]:
              path = Path(filename)
              source = path.read_text()
              if 'effectiveRole: "compliance_reviewer"' not in source:
                  source, count = re.subn(
                      r"(\n(?P<indent>\s+)reviewerId,\n)(?P=indent)decision:",
                      lambda match: (
                          match.group(1)
                          + match.group("indent")
                          + 'effectiveRole: "compliance_reviewer",\n'
                          + match.group("indent")
                          + "decision:"
                      ),
                      source,
                  )
                  if count == 0:
                      raise SystemExit(f"reviewer fixture not found in {filename}")
                  path.write_text(source)
          PY

      - name: Generate migration
        run: npm run db:generate

      - name: Format repository
        run: npm run format

      - name: Commit prepared files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "feat(identity): prepare reviewer authorization migration"
          git push origin HEAD:agent/business-identity-review-authorization
