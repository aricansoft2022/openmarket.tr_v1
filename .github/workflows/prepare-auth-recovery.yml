name: Prepare auth recovery migration

on:
  push:
    branches: [agent/auth-verification-recovery]

permissions:
  contents: write

concurrency:
  group: prepare-auth-recovery
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/auth-verification-recovery
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate migration
        run: npm run db:generate

      - name: Format repository
        run: npm run format

      - name: Commit generated files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "feat(auth): generate recovery outbox migration"
          git push origin HEAD:agent/auth-verification-recovery
